<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Agent Bancaire</title>
    <!-- Bootstrap pour le style de l'interface -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">

                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center mb-4">Espace Agent Bancaire</h4>

                        <!-- Message d'erreur affiché si la connexion échoue -->
                        <div id="erreur" class="alert alert-danger d-none"></div>

                        <!-- Formulaire de connexion agent -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="votre@email.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" id="motdepasse" class="form-control" placeholder="••••••••">
                        </div>

                        <button onclick="seConnecter()" class="btn btn-danger w-100">
                            Se connecter
                        </button>

                        <hr>
                        <p class="text-center mb-0">
                            <a href="/login">Accès espace client</a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Fonction appelée au clic sur le bouton de connexion
        async function seConnecter() {
            const email = document.getElementById('email').value;
            const motdepasse = document.getElementById('motdepasse').value;
            const erreur = document.getElementById('erreur');

            try {
                // Envoie les identifiants à l'API et récupère le token JWT
                const reponse = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, mot_de_passe: motdepasse })
                });

                const donnees = await reponse.json();

                if (reponse.ok) {
                    // Vérifie que l'utilisateur est bien un agent bancaire
                    if (donnees.role !== 'agent') {
                        erreur.classList.remove('d-none');
                        erreur.textContent = 'Accès réservé aux agents bancaires';
                        return;
                    }
                    // Stocke le token et redirige vers l'espace agent
                    window.location.href = `http://localhost:8004/agent/dashboard?token=${donnees.access_token}`;
                } else {
                    // Affiche le message d'erreur retourné par l'API
                    erreur.classList.remove('d-none');
                    erreur.textContent = donnees.detail;
                }
            } catch (e) {
                erreur.classList.remove('d-none');
                erreur.textContent = 'Erreur de connexion au serveur';
            }
        }
    </script>

</body>
</html>
