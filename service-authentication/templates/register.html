<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <!-- Bootstrap pour le style de l'interface -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">

                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center mb-4">Créer un compte</h4>

                        <!-- Message d'erreur affiché si l'inscription échoue -->
                        <div id="erreur" class="alert alert-danger d-none"></div>

                        <!-- Message de succès -->
                        <div id="succes" class="alert alert-success d-none"></div>

                        <!-- Formulaire d'inscription -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="votre@email.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <input type="password" id="motdepasse" class="form-control" placeholder="••••••••">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Rôle</label>
                            <select id="role" class="form-select">
                                <option value="client">Client</option>
                                <option value="agent">Agent bancaire</option>
                            </select>
                        </div>

                        <button onclick="sInscrire()" class="btn btn-primary w-100">
                            S'inscrire
                        </button>

                        <hr>
                        <p class="text-center mb-0">
                            <a href="/login-page">Déjà un compte ? Se connecter</a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function sInscrire() {
            const email = document.getElementById('email').value;
            const motdepasse = document.getElementById('motdepasse').value;
            const role = document.getElementById('role').value;
            const erreur = document.getElementById('erreur');
            const succes = document.getElementById('succes');

            try {
                // Envoie les données d'inscription à l'API
                const reponse = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        mot_de_passe: motdepasse,
                        role: role
                    })
                });

                const donnees = await reponse.json();

                if (reponse.ok) {
                    // Affiche le message de succès et redirige vers la connexion
                    succes.classList.remove('d-none');
                    succes.textContent = 'Compte créé avec succès ! Redirection...';
                    erreur.classList.add('d-none');

                    setTimeout(() => {
                        if (role === 'client') {
                            window.location.href = '/login-page';
                        } else {
                            window.location.href = '/login-agent-page';
                        }
                    }, 2000);

                } else {
                    // Affiche le message d'erreur retourné par l'API
                    erreur.classList.remove('d-none');
                    erreur.textContent = donnees.detail;
                    succes.classList.add('d-none');
                }
            } catch (e) {
                erreur.classList.remove('d-none');
                erreur.textContent = 'Erreur de connexion au serveur';
            }
        }
    </script>

</body>
</html>
