<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Client — Banque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">Banque — Espace Client</span>
            <button onclick="seDeconnecter()" class="btn btn-outline-light btn-sm">Déconnexion</button>
        </div>
    </nav>

    <div class="container my-4">

        <div id="erreur" class="alert alert-danger d-none"></div>
        <div id="succes" class="alert alert-success d-none"></div>

        <div class="row g-4">

            <!-- Mes comptes -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
                        <span>Mes comptes</span>
                        <button onclick="ouvrirCompte()" class="btn btn-sm btn-outline-primary">+ Ouvrir un compte</button>
                    </div>
                    <div class="card-body" id="liste-comptes">Chargement…</div>
                </div>
            </div>

            <!-- Faire une opération -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header fw-semibold">Faire une opération</div>
                    <div class="card-body">

                        <div class="mb-3">
                            <label class="form-label">Type d'opération</label>
                            <select id="type-op" class="form-select">
                                <option value="depot">Dépôt</option>
                                <option value="retrait">Retrait</option>
                                <option value="virement">Virement</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" id="label-compte">Compte</label>
                            <select id="compte" class="form-select"></select>
                        </div>

                        <div class="mb-3 d-none" id="champ-dest">
                            <label class="form-label">Compte destinataire (numéro / id)</label>
                            <input type="number" id="compte-dest" class="form-control" placeholder="ex : 3">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Montant (€)</label>
                            <input type="number" id="montant" class="form-control" min="1" step="0.01">
                        </div>

                        <button onclick="faireOperation()" class="btn btn-primary w-100">Valider</button>
                        <p class="text-muted mt-2 mb-0" style="font-size: 0.85rem;">
                            Le retrait et le virement passent en attente de validation par un agent.
                            Le dépôt est appliqué immédiatement.
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Historique des opérations -->
        <div class="card shadow-sm mt-4">
            <div class="card-header fw-semibold">Mes opérations</div>
            <div class="card-body p-0">
                <table class="table mb-0">
                    <thead>
                        <tr>
                            <th>#</th><th>Type</th><th>Montant</th>
                            <th>Source</th><th>Destinataire</th><th>Statut</th>
                        </tr>
                    </thead>
                    <tbody id="liste-operations">
                        <tr><td colspan="6" class="text-muted">Chargement…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = sessionStorage.getItem('token');
        if (!token) {
            window.location.href = '/client/login';
        }

        function afficher(idZone, message) {
            const z = document.getElementById(idZone);
            z.textContent = message;
            z.classList.remove('d-none');
            setTimeout(() => z.classList.add('d-none'), 4000);
        }

        // Affiche le champ "destinataire" uniquement pour le virement,
        // et adapte le libellé du compte (source vs destination).
        document.getElementById('type-op').addEventListener('change', function () {
            const estVirement = this.value === 'virement';
            document.getElementById('champ-dest').classList.toggle('d-none', !estVirement);
            document.getElementById('label-compte').textContent =
                this.value === 'depot' ? 'Compte à créditer' : 'Compte source';
        });

        async function ouvrirCompte() {
            const reponse = await fetch('/comptes', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (reponse.status === 401) { window.location.href = '/client/login'; return; }
            if (reponse.ok) {
                const compte = await reponse.json();
                afficher('succes', `Nouveau compte ${compte.num_compte} ouvert.`);
                chargerComptes();
            } else {
                const donnees = await reponse.json();
                afficher('erreur', donnees.detail || 'Erreur à l\'ouverture du compte');
            }
        }

        async function chargerComptes() {
            const reponse = await fetch('/comptes/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (reponse.status === 401) { window.location.href = '/client/login'; return; }

            const comptes = await reponse.json();
            const liste = document.getElementById('liste-comptes');
            const select = document.getElementById('compte');

            if (comptes.length === 0) {
                liste.innerHTML = '<p class="text-muted mb-0">Aucun compte.</p>';
                select.innerHTML = '';
                return;
            }

            liste.innerHTML = comptes.map(c =>
                `<div class="d-flex justify-content-between border rounded p-2 mb-2">
                    <span><strong>${c.num_compte}</strong> <span class="text-muted">(id ${c.id})</span></span>
                    <span class="fw-semibold">${c.solde.toFixed(2)} €</span>
                 </div>`
            ).join('');

            select.innerHTML = comptes.map(c =>
                `<option value="${c.id}">${c.num_compte} — ${c.solde.toFixed(2)} €</option>`
            ).join('');
        }

        async function chargerOperations() {
            const reponse = await fetch('/operations/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (reponse.status === 401) { window.location.href = '/client/login'; return; }

            const ops = await reponse.json();
            const corps = document.getElementById('liste-operations');

            if (ops.length === 0) {
                corps.innerHTML = '<tr><td colspan="6" class="text-muted">Aucune opération.</td></tr>';
                return;
            }

            const badge = { en_attente: 'warning', validee: 'success', refusee: 'danger' };
            corps.innerHTML = ops.map(o =>
                `<tr>
                    <td>${o.id}</td>
                    <td>${o.type_op}</td>
                    <td>${o.montant.toFixed(2)} €</td>
                    <td>${o.compte_source ?? '—'}</td>
                    <td>${o.compte_dest ?? '—'}</td>
                    <td><span class="badge text-bg-${badge[o.statut] || 'secondary'}">${o.statut}</span></td>
                 </tr>`
            ).join('');
        }

        async function faireOperation() {
            const type = document.getElementById('type-op').value;
            const compte = parseInt(document.getElementById('compte').value);
            const montant = parseFloat(document.getElementById('montant').value);

            if (!montant || montant <= 0) { afficher('erreur', 'Montant invalide'); return; }

            // On construit le corps EXACTEMENT comme l'attend le backend :
            // { type_op, montant, compte_source?, compte_dest? }
            const corps = { type_op: type, montant: montant };
            if (type === 'depot') {
                corps.compte_dest = compte;
            } else if (type === 'retrait') {
                corps.compte_source = compte;
            } else if (type === 'virement') {
                corps.compte_source = compte;
                corps.compte_dest = parseInt(document.getElementById('compte-dest').value);
            }

            const reponse = await fetch('/operations', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(corps)
            });

            const donnees = await reponse.json();
            if (reponse.ok) {
                const msg = donnees.statut === 'validee'
                    ? 'Dépôt effectué.'
                    : 'Opération créée, en attente de validation par un agent.';
                afficher('succes', msg);
                document.getElementById('montant').value = '';
                chargerComptes();
                chargerOperations();
            } else {
                afficher('erreur', donnees.detail || 'Erreur lors de l\'opération');
            }
        }

        function seDeconnecter() {
            sessionStorage.removeItem('token');
            window.location.href = '/client/login';
        }

        chargerComptes();
        chargerOperations();
    </script>
</body>
</html>
