<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Interface Agent</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>

<header>
    <h1>Interface Agent Bancaire</h1>
    <button onclick="deconnexion()">Déconnexion</button>
    <button onclick="voirComptes()">Comptes clients</button>
    <button onclick="window.location.href='http://localhost:8005/logs/dashboard'">Logs</button>
</header>

<section>
    <h2>Opérations en attente</h2>
    <div id="liste-operations">
        <!-- les opérations seront chargées ici par JS -->
    </div>
</section>

<section>
    <h2>Comptes d'un client</h2>
    <input type="number" id="user-id" placeholder="ID du client">
    <button onclick="rechercherComptes()">Rechercher</button>
    <div id="liste-comptes">
        <!-- les comptes seront chargées ici par JS -->
    </div>
</section>

</body>
<script src="/static/js/agent.js?v=3"></script>
</html>
