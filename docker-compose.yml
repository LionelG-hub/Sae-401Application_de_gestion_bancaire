
services:
  mysql:
    image : mysql:8.0
    container_name: container_sql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_db
      MYSQL_USER : DBA
      MYSQL_PASSWORD: acess123
      TZ: Europe/Paris
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  nats:
    image: nats:2.10-alpine
    container_name: container_nats
    ports:
      - "4222:4222"



  services-agent:
    build: ./service-agent
    container_name: container_agent
    ports:
      - "8004:8000"
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_started
      service-authentication:
        condition: service_started
    environment:
      - DATABASE_URL=mysql+pymysql://DBA:acess123@mysql:3306/bank_db
      - NATS_URL=nats://nats:4222
      - TZ=Europe/Paris

  service-logs:
      build: ./service-logs
      container_name: container_logs
      ports:
        - "8005:8000"
      depends_on:
        mysql:
          condition: service_healthy
        nats:
          condition: service_started
      environment:
        - DATABASE_URL=mysql+pymysql://DBA:acess123@mysql:3306/logs_db
        - NATS_URL=nats://nats:4222
        - TZ=Europe/Paris 
volumes:
  mysql_data: