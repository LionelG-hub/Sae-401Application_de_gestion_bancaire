version: "3.8"

services:
  mysql:
    image : mysql:8.0
    container_name: container_sql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_db
      MYSQL_USER : DBA
      MYSQL_PASSWORD: acess123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  nats:
    image: nats:2.10-alpine
    container_name: container_nats
    ports:
      - "4222:4222"



  services-agent:
    build: ./service-agent
    container_name: container_agent
    ports:
      - "8004:8000"
    depends_on:
      - mysql
      - nats
    environment:
      - DATABASE_URL=mysql+pymysql://DBA:acess123@mysql:3306/bank_db

  service-logs:
    build: ./service-logs
    container_name: container_logs
    ports:
      - "8005:8000"
    depends_on:
      - mysql
      - nats
    environment:
      - DATABASE_URL=mysql+pymysql://DBA:acess123@mysql:3306/logs_db
      - NATS_URL=nats://nats:4222
volumes:
  mysql_data: